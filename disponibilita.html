<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Disponibilità — Zoe Toelettatura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FFF8F0;--soft-peach:#FAEAE1;--terracotta:#C4725F;
    --forest:#4A6741;--forest-light:#6B8C62;--brown:#6B4C3B;--brown-light:#8B6E5D;
    --white:#FFFFFF;--gray100:#F7F3EF;--gray200:#E8E0D8;--gray400:#B0A498;
    --gray600:#7A6E62;--gray800:#3D3530;--red:#C0392B;--red-light:#FADBD8;--whatsapp:#25D366;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--cream);font-family:'DM Sans','Segoe UI',system-ui,sans-serif;color:var(--gray800);min-height:100vh;overflow-x:hidden}
  .header{background:linear-gradient(135deg,var(--forest),var(--forest-light));padding:28px 20px 24px;text-align:center;position:relative}
  .header-emoji{font-size:28px;margin-bottom:4px}
  .header h1{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:700;color:white;margin:0 0 4px;letter-spacing:.5px}
  .header p{color:rgba(255,255,255,.8);font-size:14px}
  .nav-home{position:absolute;top:16px;left:16px;color:rgba(255,255,255,.7);font-size:13px;text-decoration:none;font-weight:500;display:flex;align-items:center;gap:4px}
  .nav-home:hover{color:white}
  .btn-admin{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:8px 10px;cursor:pointer;color:rgba(255,255,255,.7);display:flex;align-items:center;transition:background .2s}
  .btn-admin:hover{background:rgba(255,255,255,.2)}
  .btn-admin.active{background:rgba(255,255,255,.25)}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);color:white;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.15);transition:transform .3s ease;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.success{background:var(--forest)}
  .toast.error{background:var(--red)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.show{display:flex}
  .modal{background:white;border-radius:20px;padding:32px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal-icon{text-align:center;color:var(--forest);margin-bottom:4px}
  .modal h3{font-family:'Playfair Display',Georgia,serif;text-align:center;margin:12px 0 4px;font-size:20px}
  .modal .subtitle{text-align:center;color:var(--gray400);font-size:13px;margin-bottom:20px}
  .modal input[type="password"]{width:100%;padding:14px 16px;border-radius:12px;border:2px solid var(--gray200);font-size:16px;outline:none;background:var(--gray100);font-family:inherit;transition:border-color .2s}
  .modal input[type="password"]:focus{border-color:var(--forest)}
  .modal input.error{border-color:var(--red);background:var(--red-light)}
  .modal .error-msg{color:var(--red);font-size:13px;text-align:center;margin-top:8px;display:none}
  .modal .error-msg.show{display:block}
  .modal .btn-login{width:100%;padding:14px;margin-top:16px;background:var(--forest);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  .container{max-width:520px;margin:0 auto;padding:0 16px 100px}
  .admin-panel{background:white;border-radius:16px;padding:20px;margin-top:20px;border:2px solid var(--forest);box-shadow:0 4px 20px rgba(74,103,65,.1);display:none}
  .admin-panel.show{display:block}
  .admin-title{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--gray200)}
  .admin-title h3{margin:0;font-size:16px;font-weight:700;color:var(--forest)}
  .admin-form{display:flex;flex-direction:column;gap:12px}
  .field-label{font-size:12px;color:var(--gray600);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
  .field-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--gray200);font-size:15px;background:var(--gray100);outline:none;font-family:inherit}
  .field-input:focus{border-color:var(--forest)}
  .time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .time-field{display:flex;flex-direction:column}
  .interval-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .interval-chip{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;border:1.5px solid var(--gray200);background:white;cursor:pointer;transition:all .2s;color:var(--gray600);font-family:inherit}
  .interval-chip.active{border-color:var(--forest);background:var(--forest);color:white}
  .preview-box{margin-top:12px;padding:14px;background:var(--gray100);border-radius:12px;border:1px dashed var(--gray200)}
  .preview-label{font-size:12px;color:var(--gray400);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .preview-chips{display:flex;flex-wrap:wrap;gap:6px}
  .preview-chip{background:var(--soft-peach);border-radius:8px;padding:5px 10px;font-size:13px;font-weight:500;color:var(--brown)}
  .btn-generate{width:100%;padding:14px;margin-top:4px;background:var(--forest);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
  .btn-generate:hover{background:#3d5a36}
  .btn-generate:disabled{opacity:.5;cursor:default}
  .admin-section-title{font-size:13px;font-weight:700;color:var(--gray600);margin:20px 0 10px;padding-top:16px;border-top:1px solid var(--gray200)}
  .managed-day{background:var(--gray100);border-radius:14px;padding:14px 16px;margin-bottom:10px}
  .managed-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .managed-day-title{font-size:14px;font-weight:700}
  .managed-day-count{font-size:12px;color:var(--gray400)}
  .btn-clear-day{background:var(--red-light);color:var(--red);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .managed-chips{display:flex;flex-wrap:wrap;gap:6px}
  .managed-chip{display:flex;align-items:center;gap:4px;background:var(--soft-peach);border-radius:8px;padding:5px 8px 5px 10px;font-size:13px;font-weight:500}
  .managed-chip button{background:none;border:none;cursor:pointer;color:var(--red);padding:2px;display:flex;font-size:14px;font-family:inherit}
  .section-title{font-family:'Playfair Display',Georgia,serif;font-size:18px;margin:24px 0 14px 4px;color:var(--brown)}
  .day-card{background:white;border-radius:14px;padding:16px;margin-bottom:10px;border:1.5px solid var(--gray200);box-shadow:0 2px 10px rgba(0,0,0,.03);cursor:pointer;transition:all .2s}
  .day-card:hover{border-color:var(--forest-light)}
  .day-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .day-card-left{display:flex;align-items:center;gap:8px}
  .day-card-num{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--forest),var(--forest-light));display:flex;align-items:center;justify-content:center;color:white;font-size:15px;font-weight:700}
  .day-card-name{font-size:14px;font-weight:700}
  .day-card-count{font-size:12px;color:var(--gray400)}
  .day-card-chips{display:flex;flex-wrap:wrap;gap:6px}
  .day-card-chip{background:var(--soft-peach);border-radius:8px;padding:5px 10px;font-size:13px;font-weight:500;color:var(--brown)}
  .day-card-more{background:var(--gray100);border-radius:8px;padding:5px 10px;font-size:13px;color:var(--gray400)}
  .slot-card{display:flex;align-items:center;justify-content:space-between;background:white;border-radius:14px;padding:14px 16px;border:1.5px solid var(--gray200);margin-bottom:8px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
  .slot-left{display:flex;align-items:center;gap:10px}
  .slot-icon{width:40px;height:40px;border-radius:10px;background:var(--soft-peach);display:flex;align-items:center;justify-content:center;color:var(--terracotta)}
  .slot-time{font-size:16px;font-weight:700}
  .slot-avail{font-size:12px;color:var(--gray400)}
  .slot-right{display:flex;gap:8px;align-items:center}
  .btn-delete-slot{background:var(--red-light);border:none;border-radius:10px;padding:10px;cursor:pointer;color:var(--red);display:flex}
  .btn-whatsapp{display:flex;align-items:center;gap:6px;background:var(--whatsapp);color:white;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 2px 10px rgba(37,211,102,.3);cursor:pointer;font-family:inherit}
  .btn-back{display:inline-flex;align-items:center;gap:4px;color:var(--gray600);font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;margin:20px 0 8px;padding:8px 0;font-family:inherit}
  .empty{text-align:center;padding:48px 20px;background:white;border-radius:16px;border:1.5px dashed var(--gray200)}
  .empty-emoji{font-size:40px;margin-bottom:12px}
  .empty .main-text{color:var(--gray600);font-size:15px;font-weight:500;margin-bottom:4px}
  .empty p{color:var(--gray400);font-size:14px}
  .loading{min-height:100vh;background:var(--cream);display:flex;align-items:center;justify-content:center}
  .loading-inner{text-align:center;color:var(--brown-light)}
  .loading-inner .emoji{font-size:32px;margin-bottom:12px}
  .loading-inner p{font-family:'Playfair Display',Georgia,serif;font-size:18px}
  .footer{text-align:center;padding:20px 16px;color:var(--gray400);font-size:12px;border-top:1px solid var(--gray200);background:white}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading" id="loadingScreen"><div class="loading-inner"><div class="emoji">🐾</div><p>Caricamento...</p></div></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <div class="modal-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <h3>Area Admin</h3>
    <p class="subtitle">Inserisci la password</p>
    <input type="password" id="passwordInput" placeholder="Password">
    <p class="error-msg" id="loginError">Password errata</p>
    <button class="btn-login" onclick="handleLogin()">Accedi</button>
  </div>
</div>
<div id="app" style="display:none">
  <header class="header">
    <a href="/" class="nav-home"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Home</a>
    <div class="header-emoji">🐾</div>
    <h1>Zoe Toelettatura</h1>
    <p>Prenota il tuo appuntamento</p>
    <button class="btn-admin" id="btnAdmin" onclick="toggleAdmin()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></button>
  </header>
  <div class="container">
    <div class="admin-panel" id="adminPanel">
      <div class="admin-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--forest)" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <h3>Gestione Slot</h3>
      </div>
      <div class="admin-form">
        <div>
          <label class="field-label">Giorno</label>
          <input type="date" class="field-input" id="adminDate">
        </div>
        <div class="time-row">
          <div class="time-field">
            <label class="field-label">Ora inizio</label>
            <input type="time" class="field-input" id="adminTimeStart" value="09:00">
          </div>
          <div class="time-field">
            <label class="field-label">Ora fine</label>
            <input type="time" class="field-input" id="adminTimeEnd" value="18:00">
          </div>
        </div>
        <div>
          <label class="field-label">Intervallo tra slot</label>
          <div class="interval-row">
            <button class="interval-chip" data-min="30" onclick="setIntervalMin(30)">30 min</button>
            <button class="interval-chip active" data-min="60" onclick="setIntervalMin(60)">1 ora</button>
            <button class="interval-chip" data-min="90" onclick="setIntervalMin(90)">1h 30</button>
            <button class="interval-chip" data-min="120" onclick="setIntervalMin(120)">2 ore</button>
          </div>
        </div>
        <div class="preview-box" id="previewBox" style="display:none">
          <div class="preview-label">Anteprima slot che verranno creati</div>
          <div class="preview-chips" id="previewChips"></div>
        </div>
        <button class="btn-generate" id="btnGenerate" onclick="generateSlots()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Crea slot
        </button>
      </div>
      <div class="admin-section-title" id="existingSlotsTitle" style="display:none">Slot esistenti</div>
      <div id="existingSlots"></div>
    </div>
    <div id="content"></div>
  </div>
  <div class="footer"><p>Zoe Toelettatura — Prenota via WhatsApp</p></div>
</div>
<script>
const SUPABASE_URL='https://mrfgwmvmywhcyotzgvhu.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yZmd3bXZteXdoY3lvdHpndmh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDU4MTEsImV4cCI6MjA4ODAyMTgxMX0.9Q-pyM1r44G6djZzMCXp_1w1hQ8_pp7ZiAv2ZQJMhoI';
const WHATSAPP_NUMBER='393420056508';
const ADMIN_PASSWORD='zoe2026';
let slots={},isAdmin=false,selectedDate=null,intervalMin=60;
const DAYS_IT=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const hdrs={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

async function fetchSlots(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/slots?date=gte.${todayStr()}&order=date.asc,time.asc`,{headers:hdrs});
  if(!r.ok)throw new Error('Fetch failed');
  slots={};(await r.json()).forEach(row=>{const d=row.date,t=row.time.slice(0,5);if(!slots[d])slots[d]=[];slots[d].push(t)});
}
async function insertSlot(date,time){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/slots`,{method:'POST',headers:hdrs,body:JSON.stringify({date,time})});
  if(!r.ok){const e=await r.json().catch(()=>({}));if(e.code==='23505')return'dup';throw new Error('fail')}return'ok';
}
async function deleteSlot(d,t){await fetch(`${SUPABASE_URL}/rest/v1/slots?date=eq.${d}&time=eq.${t}`,{method:'DELETE',headers:hdrs})}
async function deleteDay(d){await fetch(`${SUPABASE_URL}/rest/v1/slots?date=eq.${d}`,{method:'DELETE',headers:hdrs})}

function todayStr(){return new Date().toISOString().split('T')[0]}
function formatDate(ds){const d=new Date(ds+'T00:00:00');return`${DAYS_IT[d.getDay()]} ${d.getDate()} ${MONTHS_IT[d.getMonth()]}`}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),2500)}
function whatsappUrl(date,time){return`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(`Ciao! Vorrei prenotare un appuntamento per il giorno ${formatDate(date)} alle ore ${time}. Grazie!`)}`}
function genTimes(start,end,intv){const r=[];const[sh,sm]=start.split(':').map(Number);const[eh,em]=end.split(':').map(Number);let m=sh*60+sm;const e=eh*60+em;while(m<e){r.push(String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'));m+=intv}return r}

function toggleAdmin(){
  if(isAdmin){isAdmin=false;document.getElementById('adminPanel').classList.remove('show');document.getElementById('btnAdmin').classList.remove('active');selectedDate=null;render()}
  else{document.getElementById('loginModal').classList.add('show');document.getElementById('passwordInput').value='';document.getElementById('passwordInput').focus()}
}
function handleLogin(){
  if(document.getElementById('passwordInput').value===ADMIN_PASSWORD){
    isAdmin=true;document.getElementById('loginModal').classList.remove('show');document.getElementById('adminPanel').classList.add('show');
    document.getElementById('btnAdmin').classList.remove('active');document.getElementById('btnAdmin').classList.add('active');
    document.getElementById('loginError').classList.remove('show');document.getElementById('passwordInput').classList.remove('error');
    showToast('Accesso admin attivo');updatePreview();renderExisting();
  }else{document.getElementById('loginError').classList.add('show');document.getElementById('passwordInput').classList.add('error')}
}
document.getElementById('loginModal').addEventListener('click',function(e){if(e.target===this){this.classList.remove('show');document.getElementById('loginError').classList.remove('show');document.getElementById('passwordInput').classList.remove('error')}});
document.getElementById('passwordInput').addEventListener('keydown',function(e){if(e.key==='Enter')handleLogin()});

function setIntervalMin(min){intervalMin=min;document.querySelectorAll('.interval-chip').forEach(c=>c.classList.remove('active'));document.querySelector(`.interval-chip[data-min="${min}"]`).classList.add('active');updatePreview()}

function updatePreview(){
  const s=document.getElementById('adminTimeStart').value,e=document.getElementById('adminTimeEnd').value,d=document.getElementById('adminDate').value;
  const box=document.getElementById('previewBox'),chips=document.getElementById('previewChips');
  if(!s||!e||s>=e){box.style.display='none';return}
  const times=genTimes(s,e,intervalMin),existing=(d&&slots[d])?slots[d]:[];
  if(!times.length){box.style.display='none';return}
  box.style.display='block';
  chips.innerHTML=times.map(t=>{const ex=existing.includes(t);return`<span class="preview-chip" style="${ex?'opacity:.4;text-decoration:line-through':''};">${t}${ex?' ✓':''}</span>`}).join('');
}
document.getElementById('adminTimeStart').addEventListener('change',updatePreview);
document.getElementById('adminTimeEnd').addEventListener('change',updatePreview);
document.getElementById('adminDate').addEventListener('change',()=>{updatePreview();renderExisting()});

async function generateSlots(){
  const date=document.getElementById('adminDate').value,s=document.getElementById('adminTimeStart').value,e=document.getElementById('adminTimeEnd').value;
  if(!date){showToast('Seleziona un giorno','error');return}
  if(!s||!e||s>=e){showToast('Controlla gli orari','error');return}
  const times=genTimes(s,e,intervalMin);if(!times.length){showToast('Nessuno slot','error');return}
  const btn=document.getElementById('btnGenerate');btn.disabled=true;
  btn.innerHTML='<div style="width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite"></div> Creazione...';
  let added=0;
  for(const t of times){const r=await insertSlot(date,t);if(r==='ok'){if(!slots[date])slots[date]=[];if(!slots[date].includes(t)){slots[date].push(t);added++}}}
  if(slots[date])slots[date].sort();
  btn.disabled=false;btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Crea slot';
  showToast(`${added} slot creati per ${formatDate(date)}`);updatePreview();renderExisting();render();
}

async function removeSlot(date,time){await deleteSlot(date,time);slots[date]=slots[date].filter(t=>t!==time);if(!slots[date].length)delete slots[date];showToast(`Slot ${time} rimosso`,'error');renderExisting();render()}
async function clearDay(date){await deleteDay(date);delete slots[date];showToast('Giorno svuotato','error');if(selectedDate===date)selectedDate=null;renderExisting();render()}

function renderExisting(){
  const el=document.getElementById('existingSlots'),title=document.getElementById('existingSlotsTitle'),today=todayStr();
  const days=Object.keys(slots).filter(d=>d>=today).sort();
  if(!days.length){title.style.display='none';el.innerHTML='';return}
  title.style.display='block';
  el.innerHTML=days.map(date=>{
    const times=slots[date];
    return`<div class="managed-day"><div class="managed-day-header"><div><div class="managed-day-title">${formatDate(date)}</div><div class="managed-day-count">${times.length} slot</div></div><button class="btn-clear-day" onclick="clearDay('${date}')">Svuota</button></div><div class="managed-chips">${times.map(t=>`<div class="managed-chip"><span>${t}</span><button onclick="removeSlot('${date}','${t}')">✕</button></div>`).join('')}</div></div>`;
  }).join('');
}

function render(){
  const el=document.getElementById('content'),today=todayStr();
  if(selectedDate)return renderDetail(el,today);
  const days=Object.keys(slots).filter(d=>d>=today).sort();
  let h='<h3 class="section-title">Prossime disponibilità</h3>';
  if(!days.length){h+=`<div class="empty"><div class="empty-emoji">🐾</div><p class="main-text">Nessuna disponibilità al momento</p><p>Controlla di nuovo più tardi!</p></div>`;el.innerHTML=h;return}
  days.forEach(date=>{
    const d=new Date(date+'T00:00:00'),c=slots[date].length;
    let ch=slots[date].slice(0,6).map(t=>`<span class="day-card-chip">${t}</span>`).join('');
    if(c>6)ch+=`<span class="day-card-more">+${c-6}</span>`;
    h+=`<div class="day-card" onclick="selectDate('${date}')"><div class="day-card-top"><div class="day-card-left"><div class="day-card-num">${d.getDate()}</div><div><div class="day-card-name">${formatDate(date)}</div><div class="day-card-count">${c} slot disponibil${c===1?'e':'i'}</div></div></div><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B0A498" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div><div class="day-card-chips">${ch}</div></div>`;
  });
  el.innerHTML=h;
}

function renderDetail(el,today){
  const ds=(selectedDate>=today&&slots[selectedDate])?slots[selectedDate]:[];
  let h=`<button class="btn-back" onclick="goBack()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Tutte le date</button><h3 class="section-title" style="margin-top:8px">${formatDate(selectedDate)}</h3>`;
  if(ds.length){ds.forEach(time=>{
    h+=`<div class="slot-card"><div class="slot-left"><div class="slot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="slot-time">${time}</div><div class="slot-avail">Disponibile</div></div></div><div class="slot-right">${isAdmin?`<button class="btn-delete-slot" onclick="removeSlot('${selectedDate}','${time}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`:''}<a href="${whatsappUrl(selectedDate,time)}" target="_blank" rel="noopener" class="btn-whatsapp"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Prenota</a></div></div>`;
  })}else{h+=`<div class="empty" style="padding:40px 20px"><div class="empty-emoji" style="font-size:32px">😔</div><p>Nessuno slot disponibile</p></div>`}
  el.innerHTML=h;
}

function selectDate(d){selectedDate=d;render();window.scrollTo({top:0,behavior:'smooth'})}
function goBack(){selectedDate=null;render()}

(async function(){
  document.getElementById('adminDate').min=todayStr();document.getElementById('adminDate').value=todayStr();
  try{await fetchSlots()}catch(e){console.error(e)}
  document.getElementById('loadingScreen').style.display='none';document.getElementById('app').style.display='block';render();
})();
</script>
